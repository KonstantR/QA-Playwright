<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <form action="">
        <label for="first-name">First Name</label><input id="first-name" type="text" placeholder="FirstName"><br>
        <label for="last-name">Last Name</label><input id="last-name" type="text" placeholder="Last Name"><br>
        <label for="password">Password</label><input id="password" type="password" placeholder="Password"><br>
        <label for="email">Email</label><input id="email" type="email" placeholder="Email"><br>
        <input type="checkbox" name="" id="agree"><label for="agree">I agree for terms and condition</label><br>
        <h2>Pick your gender</h2>
        <input type="radio" name="gender" id="1"><label for="1">Fmale</label><br>
        <input type="radio" name="gender" id="2"><label for="2">Male</label><br>
        <input type="radio" name="gender" id="3"><label for="3">Other</label><br>
        <select name="" id="">
            <option value="" selected disabled>Select your country</option>
            <option value="1">Bulgaria</option>
            <option value="2">Serbia</option>
            <option value="3">Croatia</option>
            <option value="4">Slovenia</option>
            <option value="5">Montenegro</option>
        </select>



        <button>Submit</button>
    </form>

</body>

</html>
